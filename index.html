<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portafolio de Grupo - Creado para IPET 379.">
    <title>Portafolio Grupal | IPET 379</title>
    <link rel="icon" type="image/png" href="./recursos_assets/profile.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="./style.css">

</head>

<body>
    <!--Abstract background with CSS blobs-->
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <header class="site-header">
        <a href="#" class="logo">
            <img src="./recursos_assets/mariposa-monarca.jpg" alt="Logo del Grupo" class="logo-image" width="150"
                height="150" onerror="this.style.display='none'">
            <span class="logo-text">Equipo <span class="accent">Dinámico</span></span>
        </a>
    </header>
    <main class="hero">
        <div class="glass-card">
            <div class="group-logo-container">
                <img src="./recursos_assets/mariposa-monarca.jpg" alt="Logo Equipo" id="group-img" height="85"
                    width="85">
            </div>

            <div class="content">
                <span class="badge">Portfolio Grupal - IPET 379</span>
                <h1 class="name">Equipo Dinamico</h1>
                <ul class="team-list">
                    <li class="student">
                        <span class="role">Estudiante 1:</span>
                        <span class="student-name">Gomez Mile</span>
                    </li>
                    <li class="student">
                        <span class="role">Estudiante 2:</span>
                        <span class="student-name">Gil Tiziano</span>
                    </li>
                    <li class="student">
                        <span class="role">Estudiante 3:</span>
                        <span class="student-name">Brizuela Mia</span>
                    </li>
                </ul>

                <div class="cta-group">
                    <button class="btn btn-primary">Nuestros Proyectos</button>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
